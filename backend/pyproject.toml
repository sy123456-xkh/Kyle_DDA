[tool.black]
line-length = 88
target-version = ["py311"]
exclude = '''
/(
    \.venv
  | data
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [".venv", "data"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]  # pycodestyle errors/warnings + pyflakes + isort
ignore = ["E501"]               # 长行由 black 控制，ruff 不重复报

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
exclude = ["^\\.venv/", "^data/"]
